# File-merge configuration
# Supports both YAML and JSON formats

# Directory containing template files with __ prefix
templatesDir: config-templates

# Glob patterns for discovering fragment files
# Use ! prefix to exclude patterns
fragmentPatterns:
  - "**/*.fragment.*"        # Include all fragment files
  - "!node_modules/**"       # Exclude node_modules
  - "!dist/**"               # Exclude dist
  
  # Example: Include only specific folders
  # - "packages/**/*.fragment.*"
  # - "apps/**/*.fragment.*"
  
  # Example: Exclude folder but include specific patterns
  # - "!folderA/folderB/**"
  # - "folderA/folderB/catalog.*.fragment.*"

# Patterns to ignore (applied after fragmentPatterns)
ignorePatterns:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/.git/**"

# Optional: Module activation filtering (atom-framework specific)
# Uncomment if you need symlink-based module filtering
# modules:
#   activeDir: modules
#   sourceDir: available-modules

# JSON comment style configuration
# Controls how generated headers are added to JSON files
# Options: "$comment" (default), "jsonc", "none"
# - "$comment": Add "$comment", "$comment2", etc. keys at top of JSON object
# - "jsonc": Add // comments before the opening { (for JSONC-compatible parsers)
# - "none": No header comment
# jsonCommentStyle:
#   default: "$comment"           # Default style for JSON files
#   jsonc:                        # Files matching these patterns use // comments
#     - "biome.json"
#     - "tsconfig*.json"
#     - ".vscode/**/*.json"
#     - "turbo.json"
#   none:                         # Files matching these patterns have no header
#     - "package.json"
